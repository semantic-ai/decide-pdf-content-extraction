services:
  pdf-content:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uv run python -m debugpy --listen 0.0.0.0:5678 -m uvicorn web:app --host
      0.0.0.0 --port 80 --proxy-headers --timeout-keep-alive 300 --workers 1
      --reload --reload-dir /app
    ports:
      - "8081:80"
      - "5678:5678"
    networks:
      - app-decide_default
    environment:
      SEGMENTATION__API_KEY: "SECRET"
      LOG_LEVEL: "info"
      ALLOW_MU_AUTH_SUDO: true
      APACHE_TIKA_URL: "http://apache_tika:9998/tika"
      EXPECTED_TASK_PREDICATE: "http://www.w3.org/ns/adms#status"
      EXPECTED_TASK_OBJECT: "http://redpencil.data.gift/id/concept/JobStatus/scheduled"
      TARGET_GRAPH: http://mu.semte.ch/graphs/harvesting
      PUBLICATION_GRAPH: http://mu.semte.ch/graphs/publication
      MOUNTED_SHARE_FOLDER: "/mnt/share"
      CONFIG_PATH: /app/config.json
    volumes:
      - ./:/app
      - ./../app-decide/data/files:/mnt/share
      - ./config.json:/app/config.json:ro # Mount config as read-only

networks:
  app-decide_default:
    external: true
